name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  unit-tests:
    name: Unit tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      COVERAGE_FILE: .coverage.unit-py${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest -m "not integration"

      - name: Upload raw coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-agent-context-coverage-unit-py${{ matrix.python-version }}
          path: .coverage*
          include-hidden-files: true
          if-no-files-found: ignore

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    env:
      COVERAGE_FILE: .coverage.integration-py312
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest -m integration

      - name: Upload raw coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-agent-context-coverage-integration-py312
          path: .coverage*
          include-hidden-files: true
          if-no-files-found: ignore

  type-check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run mypy
        run: mypy src

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Download raw coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pr-agent-context-coverage-*
          path: coverage-data
          merge-multiple: true

      - name: Combine coverage and generate report
        shell: bash
        run: |
          shopt -s nullglob dotglob
          coverage_files=(coverage-data/.coverage*)
          if [ ${#coverage_files[@]} -eq 0 ]; then
            echo "No coverage data artifacts were produced." | tee coverage-report.txt
            {
              echo "## Coverage"
              echo
              echo "No coverage data artifacts were produced."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          python -m coverage combine coverage-data
          python -m coverage report | tee coverage-report.txt
          python -m coverage xml -o coverage.xml

          {
            echo "## Coverage"
            echo
            echo '```text'
            cat coverage-report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload combined coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: |
            coverage.xml
            coverage-report.txt
          if-no-files-found: warn

  pr-agent-context:
    name: PR agent context
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs: [pre-commit, unit-tests, integration-tests, type-check, coverage]
    permissions:
      contents: read
      actions: read
      pull-requests: write
    uses: shaypal5/pr-agent-context/.github/workflows/pr-agent-context.yml@v4.0.19
    with:
      tool_ref: v4.0.19
      publish_mode: append
      target_patch_coverage: "100"
      include_review_comments: true
      include_failing_checks: true
      include_patch_coverage: true
      patch_coverage_source_mode: coverage_xml_artifact
      coverage_report_artifact_name: coverage-xml
      coverage_report_filename: coverage.xml
      prompt_template_file: .github/pr-agent-context-template.md
      debug_artifacts: true
